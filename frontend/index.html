<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Currency Converter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Animated background grid -->
  <div class="bg-grid"></div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="container py-5">

    <!-- Header -->
    <div class="text-center mb-5">
      <div class="brand-badge mb-3">
        <span class="ticker-dot"></span> Live Exchange Rates
      </div>
      <h1 class="display-title">
        <em>Currency</em> Converter
      </h1>
      <p class="subtitle">Real-time currency conversion, powered by live market data.</p>
    </div>

    <!-- Main Converter Card -->
    <div class="row justify-content-center">
      <div class="col-lg-7 col-xl-6">

        <div class="converter-card">
          <div class="card-inner">

            <!-- Amount Input -->
            <div class="field-group mb-4">
              <label class="field-label">Amount</label>
              <div class="amount-wrapper">
                <span class="amount-symbol" id="fromSymbol">$</span>
                <input
                  type="number"
                  id="amount"
                  class="amount-input"
                  placeholder="0.00"
                  min="0"
                  step="any"
                />
              </div>
            </div>

            <!-- Currency Selectors -->
            <div class="row g-3 mb-4 align-items-center">
              <div class="col">
                <label class="field-label">From</label>
                <div class="select-wrapper">
                  <select id="fromCurrency" class="currency-select"></select>
                </div>
              </div>

              <div class="col-auto swap-col">
                <button class="swap-btn" id="swapBtn" title="Swap currencies">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 16V4m0 0L3 8m4-4l4 4"/>
                    <path d="M17 8v12m0 0l4-4m-4 4l-4-4"/>
                  </svg>
                </button>
              </div>

              <div class="col">
                <label class="field-label">To</label>
                <div class="select-wrapper">
                  <select id="toCurrency" class="currency-select"></select>
                </div>
              </div>
            </div>

            <!-- Convert Button -->
            <button class="convert-btn w-100" id="convertBtn">
              <span class="btn-text">Convert</span>
              <span class="spinner-border spinner-border-sm d-none" id="spinner" role="status"></span>
            </button>

            <!-- Result -->
            <div id="resultArea" class="result-area d-none">
              <div class="result-label" id="resultLabel">Result</div>
              <div class="result-value" id="resultValue">—</div>
              <div class="result-rate" id="resultRate"></div>
            </div>

          </div>
        </div>

        <!-- History Section -->
        <div class="history-card mt-4">
          <div class="history-header">
            <h6 class="history-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="me-2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              Recent Conversions
            </h6>
            <button class="history-refresh" id="refreshHistory" title="Refresh history">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            </button>
          </div>

          <div id="historyList" class="history-list">
            <div class="history-empty">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/><path d="M12 6v6l4 2"/></svg>
              <p>No conversions yet.<br/>Make your first one above.</p>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Footer -->
    <div class="text-center mt-5 footer-note">
      ©Copyright. All rights reserved.
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
